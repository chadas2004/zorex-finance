<!DOCTYPE html>
<html lang="de" x-data="successPage()" x-init="init()">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title x-text="$t('title')">Anfrage erhalten | Zorex Finance</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23042C53'/><path d='M16 4L6 10v7c0 6.6 4.4 12.8 10 14.4 5.6-1.6 10-7.8 10-14.4V10L16 4z' fill='none' stroke='%23FAC775' stroke-width='2'/></svg>">

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root {
      --navy: #042C53;
      --navy-mid: #0C447C;
      --blue: #185FA5;
      --gold: #FAC775;
      --gold-dark: #EF9F27;
      --gold-deeper: #BA7517;
      --cream: #FAFAF8;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: #1a1a1a; min-height: 100vh; }
    .font-display { font-family: 'Playfair Display', serif; }

    /* Dark mode */
    .dark body { background: #0a1628; color: #e8edf4; }
    .dark .nav-bg { background: rgba(10,22,40,0.97) !important; border-color: rgba(255,255,255,0.07) !important; }
    .dark .card-surface { background: #0f2040 !important; border-color: rgba(255,255,255,0.08) !important; }
    .dark .recap-bg { background: #0a1628 !important; border-color: rgba(255,255,255,0.06) !important; }
    .dark .lang-menu { background: #0f2040 !important; border-color: rgba(255,255,255,0.1) !important; }
    .dark .lang-option:hover { background: rgba(255,255,255,0.05) !important; }
    .dark .recap-label { color: #94a3b8 !important; }
    .dark .recap-value { color: #e2e8f0 !important; }
    .dark .footer-bg { background: #021629 !important; }
    .dark .back-link { color: var(--gold) !important; }

    /* Header */
    .nav-bg {
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(4,44,83,0.08);
    }
    .nav-link { font-size: 14px; color: #374151; transition: color 0.2s; text-decoration: none; }
    .nav-link:hover { color: var(--navy); }
    .dark .nav-link { color: #94a3b8; }
    .dark .nav-link:hover { color: var(--gold); }

    /* Cards */
    .card-surface {
      background: #ffffff;
      border: 1px solid rgba(4,44,83,0.08);
      border-radius: 20px;
    }
    .recap-bg {
      background: #F8FAFC;
      border: 1px solid rgba(4,44,83,0.06);
      border-radius: 14px;
    }

    /* Success animation */
    @keyframes successPop {
      0%   { transform: scale(0.4); opacity: 0; }
      60%  { transform: scale(1.15); opacity: 1; }
      80%  { transform: scale(0.95); }
      100% { transform: scale(1); }
    }
    @keyframes confettiDrop {
      0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(80px) rotate(360deg); }
    }
    .success-icon { animation: successPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .confetti-dot {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: confettiDrop 1.6s ease-out forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .delay-1 { animation-delay: 0.35s; opacity: 0; }
    .delay-2 { animation-delay: 0.5s; opacity: 0; }
    .delay-3 { animation-delay: 0.65s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 0.95s; opacity: 0; }

    /* Check circle */
    .check-circle {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto;
      box-shadow: 0 0 0 12px rgba(34,197,94,0.1), 0 0 0 24px rgba(34,197,94,0.05);
    }

    /* WhatsApp btn */
    .wa-btn-main {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-weight: 600; font-size: 15px;
      padding: 16px 28px;
      border-radius: 14px;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(34,197,94,0.25);
    }
    .wa-btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(34,197,94,0.35); }

    /* Recap row */
    .recap-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(4,44,83,0.05);
    }
    .dark .recap-row { border-color: rgba(255,255,255,0.05); }
    .recap-row:last-child { border-bottom: none; }
    .recap-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 14px;
    }

    /* Steps timeline */
    .timeline-item { position: relative; padding-left: 36px; }
    .timeline-item::before {
      content: '';
      position: absolute; left: 11px; top: 28px;
      width: 1px; bottom: -8px;
      background: rgba(4,44,83,0.1);
    }
    .dark .timeline-item::before { background: rgba(255,255,255,0.08); }
    .timeline-item:last-child::before { display: none; }
    .timeline-dot {
      position: absolute; left: 0; top: 4px;
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }

    /* Lang dropdown */
    .lang-menu {
      position: absolute; right: 0; top: calc(100% + 8px);
      background: white;
      border: 1px solid rgba(4,44,83,0.1);
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
      min-width: 160px; z-index: 100; overflow: hidden;
    }
    .lang-option:hover { background: rgba(4,44,83,0.04); }

    /* Floating WA */
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      70%  { box-shadow: 0 0 0 14px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    .wa-float { animation: pulse-ring 2.5s ease-in-out infinite; }

    /* Footer */
    .footer-bg { background: #021629; }

    .section-eyebrow {
      display: inline-block;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold-deeper);
      background: rgba(250,199,117,0.12);
      padding: 4px 12px; border-radius: 50px;
    }
  </style>
</head>

<body :class="$store.theme.current === 'dark' ? 'dark' : ''" class="transition-colors duration-300">

<script>
document.addEventListener('alpine:init', () => {
  Alpine.store('theme', {
    current: localStorage.getItem('theme') || 'light',
    toggle() {
      this.current = this.current === 'light' ? 'dark' : 'light';
      document.documentElement.classList.toggle('dark', this.current === 'dark');
      localStorage.setItem('theme', this.current);
    },
    init() { document.documentElement.classList.toggle('dark', this.current === 'dark'); }
  });
});
</script>

<script>
// ===== CONFIGURATION GLOBALE =====
const CONFIG = {
  whatsappNumber: '491771320599',
  brand: 'Zorex Finance',
  supportedLangs: ['de', 'fr', 'en', 'pt', 'el', 'it', 'es']  // ✅ DE en premier
};

// ===== FORMAT WHATSAPP PAR PAYS =====
const WHATSAPP_FORMATS = {
  'DE': '+49 XXX XXXXXXX', 'PT': '+351 XXX XXX XXX', 'GR': '+30 XXX XXX XXXX',
  'AT': '+43 XXX XXXXXXX', 'IT': '+39 XXX XXX XXXX', 'CH': '+41 XX XXX XX XX',
  'FR': '+33 X XX XX XX XX', 'ES': '+34 XXX XXX XXX'
};

function successPage() {
  return {
    form: {},

    init() {
      this.$store.theme.init();
      // ✅ Détection de langue avec fallback sur 'de' (allemand)
      let langCode = localStorage.getItem('zorex_lang') || navigator.language.split('-')[0];
      if (!CONFIG.supportedLangs.includes(langCode)) langCode = 'de'; // ✅ Fallback allemand
      this.currentLang = this.languages.find(l => l.code === langCode) || this.languages[0];
      document.documentElement.lang = this.currentLang.code;
      this.generateReferenceId();
      this.loadData();
    },

    generateReferenceId() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let id = 'ZRX-' + new Date().getFullYear() + '-';
      for (let i = 0; i < 6; i++) id += chars.charAt(Math.floor(Math.random() * chars.length));
      this.referenceId = id;
    },

    selectLang(lang) {
      this.currentLang = lang;
      localStorage.setItem('zorex_lang', lang.code);
      document.documentElement.lang = lang.code;
      this.updateWhatsAppLink();
    },

    $t(key, params = {}) {
      const dict = this.translations[this.currentLang.code] || this.translations.de; // ✅ Fallback sur allemand
      let text = key.split('.').reduce((o, k) => o?.[k], dict) ?? key;
      Object.entries(params).forEach(([k, v]) => { text = text.replaceAll(`{${k}}`, v); });
      return text;
    },

    getCountryLabel(code) {
      const labels = {
        'DE': '🇩🇪 Deutschland (+49)', 'PT': '🇵🇹 Portugal (+351)', 'GR': '🇬🇷 Griechenland (+30)',
        'AT': '🇦🇹 Österreich (+43)', 'IT': '🇮🇹 Italia (+39)', 'CH': '🇨🇭 Schweiz (+41)',
        'FR': '🇫🇷 France (+33)', 'ES': '🇪🇸 España (+34)'
      };
      return labels[code] || code;
    },

    getLoanTypeLabel(type) {
      const labels = {
        'personal': this.$t('offers.personal.title'),
        'immobilier': this.$t('offers.immobilier.title'),
        'auto': this.$t('offers.auto.title'),
        'professionnel': this.$t('form.fields.type.professionnel'),
        'etudiant': this.$t('form.fields.type.etudiant')
      };
      return labels[type] || type;
    },

    formatAmount(amount) {
      const num = parseFloat(amount);
      if (isNaN(num)) return amount + ' €';
      // ✅ Formatage adapté à la langue actuelle
      const locale = this.currentLang.code === 'de' ? 'de-DE' : 
                     this.currentLang.code === 'fr' ? 'fr-FR' :
                     this.currentLang.code === 'it' ? 'it-IT' :
                     this.currentLang.code === 'es' ? 'es-ES' :
                     this.currentLang.code === 'pt' ? 'pt-PT' :
                     this.currentLang.code === 'el' ? 'el-GR' : 'en-GB';
      return num.toLocaleString(locale) + ' €';
    },

    loadData() {
      const urlParams = new URLSearchParams(window.location.search);
      if (!urlParams.has('nom')) {
        window.location.replace('index.html');
        return;
      }
      this.form = {
        nom: urlParams.get('nom') || '',
        prenom: urlParams.get('prenom') || '',
        email: urlParams.get('email') || '',
        pays: urlParams.get('pays') || '',
        type: urlParams.get('type') || '',
        montant: urlParams.get('montant') || '',
        adresse: urlParams.get('adresse') || '',
        codepostal: urlParams.get('codepostal') || ''
      };
      this.updateWhatsAppLink();
    },

    updateWhatsAppLink() {
      const message = [
        this.$t('success.whatsapp_greeting'),
        '',
        `📋 ${this.$t('success.reference_label')}: ${this.referenceId}`,
        `👤 ${this.$t('form.fields.prenom')}: ${this.form.prenom}`,
        `👤 ${this.$t('form.fields.nom')}: ${this.form.nom}`,
        `📧 ${this.$t('form.fields.email')}: ${this.form.email}`,
        `🌍 ${this.$t('form.fields.pays.label')}: ${this.getCountryLabel(this.form.pays)}`,
        `💰 ${this.$t('form.fields.type.placeholder')}: ${this.getLoanTypeLabel(this.form.type)}`,
        `💶 ${this.$t('form.fields.montant')}: ${this.formatAmount(this.form.montant)}`,
        `📱 ${this.$t('form.fields.adresse')}: ${this.form.adresse}`,
        `📮 ${this.$t('form.fields.codepostal')}: ${this.form.codepostal}`,
        '',
        this.$t('success.whatsapp_thanks')
      ].join('\n');
      this.whatsappLink = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(message)}`;
    }
  }
